<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <title>Страница не найдена — Театр «Эмоцика»</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/assets/scss/style.scss" />
    <style>
        .error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2a1748 0, #0b0617 100%);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .error-content {
            max-width: 500px;
        }

        .error-code {
            font-size: clamp(80px, 20vw, 150px);
            font-weight: 700;
            font-family: var(--font-heading);
            color: rgba(255, 255, 255, 0.1);
            line-height: 1;
            margin: 0;
        }

        .error-title {
            font-size: clamp(24px, 5vw, 36px);
            margin: -0.5em 0 1rem;
            color: #fff;
        }

        .error-text {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Сцена не найдена</h2>
            <p class="error-text">
                Похоже, вы зашли слишком далеко за кулисы.
                Вернемся в зрительный зал?
            </p>
            <a href="/" class="btn btn-primary">Вернуться на главную</a>
        </div>
    </div>
</body>

</html>
